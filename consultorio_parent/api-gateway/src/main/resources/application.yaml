server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      routes:
        - id: ms-paciente
          uri: lb://ms-paciente
          predicates:
            - Path=/api/v1/pacientes/**

        - id: ms-personal-salud
          uri: lb://ms-personal-salud
          predicates:
            - Path=/api/v1/personal/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka