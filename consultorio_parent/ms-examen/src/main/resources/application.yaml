server:
  port: 8081  # Puerto único para este microservicio

spring:
  application:
    name: ms-examenes # Nombre con el que aparecerá en Eureka
  
  datasource:
    url: jdbc:mysql://localhost:3306/consultorio_examenes_db?createDatabaseIfNotExist=true
    username: root
    password:  ""
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false # Para que las fechas se vean como texto ISO

# CONFIGURACIÓN DE EUREKA CLIENT
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/ # URL del servidor Eureka
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true # Recomendado para microservicios en Docker o local
    instance-id: ${spring.application.name}:${spring.application.instance_id:${random.value}}
   