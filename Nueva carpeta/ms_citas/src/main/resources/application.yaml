server:
  port: 8089

spring:
  application:
    name: mscitas

  datasource:
    url: jdbc:mysql://localhost:3306/mscitas?useSSL=false&serverTimezone=UTC
    username: root
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka