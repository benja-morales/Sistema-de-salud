server:
  port: 8087

spring:
  application:
    name: msmedico

  datasource:
    url: jdbc:mysql://localhost:3306/msmedico?useSSL=false&serverTimezone=UTC
    username: root
    password:

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka